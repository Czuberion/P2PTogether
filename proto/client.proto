syntax = "proto3";
package p2p;

import "google/protobuf/empty.proto";

option go_package = "peer_service/proto/client";

// ––– Service-level messages –––

message ServiceInfo {
  // HTTP port where this peer's mini-HLS server is listening on localhost.
  uint32 hls_port = 1;
}

// ––– Streaming wrappers –––

message ClientMsg {
  // oneof { your various client→service payloads go here }
  oneof payload {
    QueueCmd queue_cmd = 1;
    // future: ChatMsg chat = 2;
  }
}

message ServerMsg {
  // oneof { your various service→client payloads go here }
  oneof payload {
    QueueUpdate queue_update = 1;
    // future: ChatMsg chat = 2;
  }
}

// ––– RPC service for Client ↔ Peer Service –––

service P2PTClient {
  // Tell me about your HLS port
  rpc GetServiceInfo(google.protobuf.Empty) returns (ServiceInfo);

  // Bidirectional control & chat stream
  rpc ControlStream(stream ClientMsg) returns (stream ServerMsg);
}

// Queue

message QueueCmd {
  enum Type {
    APPEND = 0;
    REMOVE = 1;
    NEXT = 2;
    CLEAR = 3;
  }
  Type type = 1;
  string file_path = 2; // meaningful only for APPEND
  int32 index = 3;      // position for REMOVE (-1 ignored)
  int64 hlc_ts = 4;
}

message QueueUpdate { repeated QueueItem items = 1; }

message QueueItem {
  string file_path = 1;
  string stored_by = 2; // peer.ID as string
  string added_by = 3;  // peer.ID
  int64 hlc_ts = 4;
}
