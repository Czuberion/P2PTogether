syntax = "proto3";
package client;

import "google/protobuf/empty.proto";
import "p2p/queue.proto";
import "p2p/role.proto";
import "p2p/streaming.proto";
import "p2p/playback.proto";
import "p2p/chat.proto";
import "p2p/analytics.proto";

option go_package = "peer_service/proto;client";

/* ——— Service‑level ——— */

message ServiceInfo {
  // HTTP port where this peer's HLS server is listening on localhost.
  uint32 hls_port = 1;
}

// Sent by the service to the client upon successful ControlStream connection,
// identifying the client's effective peer ID as recognized by this service
// instance.
message LocalPeerIdentity {
  string peer_id = 1; // The libp2p Peer ID string of this service node.
}

/* ——— Streaming wrappers ——— */

message ClientMsg {
  // oneof { your various client→service payloads go here }
  oneof payload {
    client.p2p.QueueCmd queue_cmd = 1;
    client.p2p.SetPlaybackStateCmd playback_state_cmd = 2;
    client.p2p.ChatCmd chat_cmd = 3;
    client.p2p.SetPeerRolesCmd set_peer_roles_cmd = 4;
    client.p2p.UpdateRoleCmd update_role_cmd = 5;
    client.p2p.RemoveRoleCmd remove_role_cmd = 6;
    client.p2p.PlaybackStreamCompleted playback_stream_completed_cmd = 7;
  }
}

message ServerMsg {
  // oneof { your various service→client payloads go here }
  oneof payload {
    client.p2p.QueueUpdate queue_update = 1;
    client.p2p.StreamStatus stream_status = 2;
    client.p2p.ChatMsg chat_msg = 3;
    client.p2p.AnalyticsUpdate analytics_update = 4;
    client.p2p.RoleDefinitionsUpdate role_definitions_update = 5;
    client.p2p.PeerRoleAssignment peer_role_assignment = 6;
    client.p2p.AllPeerRoleAssignments all_peer_role_assignments = 7;
    LocalPeerIdentity local_peer_identity = 8;
    client.p2p.SetPlaybackStateCmd playback_state_cmd = 9;
    client.p2p.PlaylistReset playlist_reset = 10;
  }
}

/* ——— RPC (Client ↔ Peer Service) ——— */

service P2PTClient {
  // Tell me about your HLS port
  rpc GetServiceInfo(google.protobuf.Empty) returns (ServiceInfo);
  // Bidirectional control
  rpc ControlStream(stream ClientMsg) returns (stream ServerMsg);
}
