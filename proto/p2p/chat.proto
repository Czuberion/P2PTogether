syntax = "proto3";
package client.p2p;

option go_package = "peer_service/proto/p2p";

// Chat commands sent from a client to the Peer Service.
message ChatCmd {
  // The text of the chat message.
  string text = 1;
  // Hybrid Logical Clock timestamp for ordering.
  int64 hlc_ts = 2;
  // If non-empty, indicates this is a reply to the given message_id.
  string reply_to = 3;
}

// Command to delete a specific chat message.
message ChatDeleteCmd {
  // The message_id of the message to delete.
  string message_id = 1;
  // Hybrid Logical Clock timestamp for ordering.
  int64 hlc_ts = 2;
}

// Chat messages broadcast by the Peer Service to all clients.
message ChatMsg {
  // Service-generated ULID for this message.
  string message_id = 1;
  // Peer.ID (string form) of the sender.
  string sender = 2;
  // The text of the chat message.
  string text = 3;
  // Hybrid Logical Clock timestamp for ordering.
  int64 hlc_ts = 4;
  // If non-empty, indicates this is a reply to the given message_id.
  string reply_to = 5;
}

// Broadcast when a chat message is deleted by a moderator/admin.
message ChatDeleteMsg {
  // The message_id of the deleted message.
  string message_id = 1;
  // Peer.ID (string form) of the moderator/admin who deleted the message.
  string deleted_by = 2;
  // Hybrid Logical Clock timestamp for ordering.
  int64 hlc_ts = 3;
}